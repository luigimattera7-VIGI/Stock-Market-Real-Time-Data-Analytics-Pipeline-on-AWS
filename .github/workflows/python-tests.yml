name: Python Tests and Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10', 3.11]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Step1/requirements.txt
        pip install flake8 pytest black
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 Step1/stream_stock_data.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 Step2/lambda_function.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 Step4/lambda_function.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 Step1/stream_stock_data.py Step2/lambda_function.py Step4/lambda_function.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with black
      run: |
        black --check Step1/stream_stock_data.py Step2/lambda_function.py Step4/lambda_function.py || true
    
    - name: Check if files are in .gitignore
      run: |
        if grep -q "\.env" .gitignore && grep -q "__pycache__" .gitignore; then
          echo ".gitignore looks good"
        else
          echo ".gitignore missing important entries"
          exit 1
        fi
